# Netlify-Konfiguration für das Frontend (Single Page App).
# Das Base-Directory ("frontend") wird bereits im Root-`netlify.toml` gesetzt,
# damit Netlify diese Datei beim allerersten Deploy zuverlässig findet.
# Wichtig: Im Netlify-Dashboard die Variable VITE_API_BASE_URL setzen
# (auf den Cloudflare-Tunnel-Hostname deiner QNAP-API, z. B. https://api.alae.app).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA-Fallback: alle Routen auf index.html (ausser echte Dateien).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
